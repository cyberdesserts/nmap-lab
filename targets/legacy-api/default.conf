# legacy-api nginx configuration
#
# A plain API-style host on port 8080 returning a static JSON payload.
# The server version (pinned old in the Dockerfile) is the observable the
# reader detects with -sV and then verifies before making any claim.

server {
    listen 8080;
    server_name legacy-api;

    access_log /var/log/nginx/access.log;

    location / {
        root /usr/share/nginx/html;
        index index.json;
        default_type application/json;
    }

    # An unauthenticated status endpoint that returns service metadata.
    # Teaches: an API that answers without asking who you are is itself a
    # finding worth noting.
    location /status {
        default_type application/json;
        return 200 '{"service":"orders-api","status":"ok","auth":"none"}';
    }
}
