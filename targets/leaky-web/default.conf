# leaky-web nginx configuration
#
# Two server blocks on two ports, a synthetic information-disclosure header,
# and access logging left on so a scan is visible from the target side.

# Main site on the expected port.
server {
    listen 80;
    server_name leaky-web;

    # Information disclosure: a custom header leaking a fake internal build
    # string. This is entirely synthetic. The lesson is recognising that a
    # server should not advertise internal build detail, not the string itself.
    add_header X-Internal-Build "buildsvc-prod-04.internal v2.3.1-rc" always;

    # Access logging to stdout so `docker logs leaky-web` (or a tail inside
    # the container) shows every request, including each nmap probe.
    access_log /var/log/nginx/access.log;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}

# Second site on an uncommon high port (48081), outside the 1000 ports a
# default nmap scan checks. A default scan misses this entirely; only a
# full-range scan (-p-) finds it. Finding it is the point.
server {
    listen 48081;
    server_name leaky-web;

    add_header X-Internal-Build "buildsvc-prod-04.internal v2.3.1-rc" always;
    access_log /var/log/nginx/access.log;

    location / {
        root /usr/share/nginx/html-admin;
        index index.html;
    }
}
