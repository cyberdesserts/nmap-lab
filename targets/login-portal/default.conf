# login-portal nginx configuration
server {
    listen 8000;
    server_name login-portal;

    access_log /var/log/nginx/access.log;

    # A telltale header some applications set. Teaches reading headers to
    # fingerprint an application, then confirming with the page content.
    add_header X-Powered-By "AcmePortal" always;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}
